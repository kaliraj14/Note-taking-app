<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f2f6;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.controls {
    margin: 20px;
}

input, select, button {
    padding: 10px;
    margin: 5px;
}

#notesContainer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.note {
    width: 200px;
    min-height: 150px;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    position: relative;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
}

.note textarea {
    width: 100%;
    height: 100px;
    border: none;
    background: transparent;
    resize: none;
    font-size: 14px;
}

.note button {
    position: absolute;
    bottom: 5px;
    right: 5px;
    background: red;
    color: white;
    border: none;
    padding: 5px;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>📝 Notes App</h1>

<div class="controls">
    <input type="text" id="noteInput" placeholder="Write a note...">

    <select id="colorPicker">
        <option value="#fffa65">Yellow</option>
        <option value="#ff9ff3">Pink</option>
        <option value="#7bed9f">Green</option>
        <option value="#70a1ff">Blue</option>
    </select>

    <button onclick="addNote()">Add Note</button>
</div>

<div id="notesContainer"></div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes() {
    localStorage.setItem("notes", JSON.stringify(notes));
}

function displayNotes() {
    const container = document.getElementById("notesContainer");
    container.innerHTML = "";

    notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";
        div.style.background = note.color;

        div.innerHTML = `
            <textarea onchange="editNote(${index}, this.value)">${note.text}</textarea>
            <button onclick="deleteNote(${index})">X</button>
        `;

        container.appendChild(div);
    });
}

function addNote() {
    const input = document.getElementById("noteInput");
    const color = document.getElementById("colorPicker").value;

    if (input.value.trim() === "") {
        alert("Please write something!");
        return;
    }

    notes.push({
        text: input.value,
        color: color
    });

    input.value = "";
    saveNotes();
    displayNotes();
}

function editNote(index, newText) {
    notes[index].text = newText;
    saveNotes();
}

function deleteNote(index) {
    notes.splice(index, 1);
    saveNotes();
    displayNotes();
}

displayNotes();
</script>

</body>
</html>
